<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} | {{ site.tagline }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}">
<link rel="icon" type="image/svg+xml" href="{{ '/images/favicon.svg' | relative_url }}">
<link rel="icon" type="image/png" sizes="192x192" href="{{ '/images/logo-icon.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/images/logo-icon.png' | relative_url }}">

<!-- Open Graph / Social -->
<meta property="og:type" content="{{ page.og_type | default: 'website' }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} | {{ site.tagline }}{% endif %}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}">
<meta property="og:image" content="{{ page.image | default: site.og_image | absolute_url }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} | {{ site.tagline }}{% endif %}">
<meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}">
<meta name="twitter:image" content="{{ page.image | default: site.og_image | absolute_url }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">

{% if page.noindex %}<meta name="robots" content="noindex">{% endif %}

<!-- Cookie-gated Google Analytics 4 -->
<script src="{{ '/assets/js/cookie-consent.js' | relative_url }}"></script>

{% include tailwind-config.html %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

{% seo %}
