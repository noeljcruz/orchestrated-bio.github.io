<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#279F81"/>
      <stop offset="100%" stop-color="#1B7760"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#111826"/>
  <!-- Simplified DNA helix icon for favicon -->
  <g transform="translate(32,32)">
    <!-- Outer circular enclosure - yin-yang style -->
    <path d="M-2,-20 A20,20 0 0,1 2,20" fill="none" stroke="#279F81" stroke-width="4" stroke-linecap="round"/>
    <path d="M2,20 A20,20 0 0,1 -2,-20" fill="none" stroke="#279F81" stroke-width="4" stroke-linecap="round"/>
    <!-- Central DNA strand suggestion -->
    <path d="M-6,-14 Q0,-8 6,-4 Q0,0 -6,4 Q0,8 6,14" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Nucleotide dots -->
    <circle cx="-6" cy="-14" r="2.5" fill="#279F81"/>
    <circle cx="6" cy="-4" r="2.5" fill="#279F81"/>
    <circle cx="-6" cy="4" r="2.5" fill="#279F81"/>
    <circle cx="6" cy="14" r="2.5" fill="#279F81"/>
    <circle cx="0" cy="-9" r="2" fill="#279F81"/>
    <circle cx="0" cy="1" r="2" fill="#279F81"/>
  </g>
</svg>
