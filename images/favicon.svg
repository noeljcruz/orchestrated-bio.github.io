      <line x1="4" y1="16" x2="4" y2="20"/>
      <line x1="11" y1="12" x2="11" y2="24"/>
      <line x1="18" y1="9" x2="18" y2="27"/>
      <line x1="25" y1="12" x2="25" y2="24"/>
      <line x1="32" y1="16" x2="32" y2="20"/>
      <line x1="39" y1="12" x2="39" y2="24"/>
      <line x1="46" y1="9" x2="46" y2="27"/>
      <line x1="53" y1="12" x2="53" y2="24"/>
    </g>
    <!-- Waves -->
    <path d="M-2 18 Q 12 -2, 28 18 T 58 18" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.95"/>
    <path d="M-2 18 Q 12 38, 28 18 T 58 18" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
