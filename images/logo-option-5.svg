<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150">
  <!-- Icon -->
  <g transform="translate(30, 35)">
    <!-- Simulated vertical sound/data wave -->
    <line x1="0" y1="35" x2="0" y2="45" stroke="#16b17e" stroke-width="12" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="20" y2="60" stroke="#12a273" stroke-width="12" stroke-linecap="round"/>
    <line x1="40" y1="0" x2="40" y2="80" stroke="#087253" stroke-width="12" stroke-linecap="round"/>
    <line x1="60" y1="15" x2="60" y2="65" stroke="#0c8760" stroke-width="12" stroke-linecap="round"/>
    <line x1="80" y1="30" x2="80" y2="50" stroke="#16b17e" stroke-width="12" stroke-linecap="round"/>
    
