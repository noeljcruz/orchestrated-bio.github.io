<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1020"/>
      <stop offset="100%" stop-color="#1a1f3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16b17e"/>
      <stop offset="100%" stop-color="#3acc98"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16b17e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#16b17e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="72" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white">Insight Platform Architecture</text>
  <text x="600" y="102" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#9ca3af">Agentic AI over structured cancer genomics data</text>

  <!-- === Layer 1: User Input === -->
  <rect x="80" y="150" width="260" height="100" rx="16" fill="#0d1020" stroke="#16b17e" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="80" y="150" width="260" height="100" rx="16" fill="#16b17e" fill-opacity="0.05"/>
  <text x="210" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3acc98">USER</text>
  <text x="210" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">"What's the survival difference</text>
  <text x="210" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">for TP53 mutations in BRCA?"</text>

  <!-- Arrow 1 -->
  <line x1="340" y1="200" x2="430" y2="200" stroke="url(#arrow-grad)" stroke-width="2"/>
  <polygon points="430,194 442,200 430,206" fill="#16b17e"/>

  <!-- === Layer 2: Understanding Layer (LLM) === -->
  <rect x="450" y="140" width="300" height="120" rx="16" fill="#0d1020" stroke="#5652b3" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="450" y="140" width="300" height="120" rx="16" fill="#5652b3" fill-opacity="0.05"/>
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#919ee6">UNDERSTANDING LAYER</text>
  <text x="600" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#9ca3af">Intent Parsing</text>
  <text x="600" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#9ca3af">Analysis Planning</text>
  <text x="600" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#9ca3af">Result Explanation</text>

  <!-- Arrow 2 -->
  <line x1="750" y1="200" x2="840" y2="200" stroke="url(#arrow-grad)" stroke-width="2"/>
  <polygon points="840,194 852,200 840,206" fill="#16b17e"/>

  <!-- === Layer 3: Execution Engine === -->
  <rect x="860" y="140" width="260" height="120" rx="16" fill="#0d1020" stroke="#16b17e" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="860" y="140" width="260" height="120" rx="16" fill="#16b17e" fill-opacity="0.05"/>
  <text x="990" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3acc98">EXECUTION ENGINE</text>
  <text x="990" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#9ca3af">Validated Bioinformatics</text>
  <text x="990" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#9ca3af">Statistical Analysis</text>
  <text x="990" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#9ca3af">Visualization Engine</text>

  <!-- Arrow down from Execution to Data -->
  <line x1="990" y1="260" x2="990" y2="320" stroke="url(#arrow-grad)" stroke-width="2"/>
  <polygon points="984,320 990,332 996,320" fill="#16b17e"/>

  <!-- === Layer 4: Data Layer === -->
  <rect x="700" y="340" width="420" height="100" rx="16" fill="#0d1020" stroke="#3acc98" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="700" y="340" width="420" height="100" rx="16" fill="#16b17e" fill-opacity="0.03"/>
  <text x="910" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3acc98">TCGA DATA LAYER</text>

  <!-- Data type boxes -->
  <rect x="720" y="390" width="90" height="32" rx="8" fill="#16b17e" fill-opacity="0.1" stroke="#16b17e" stroke-opacity="0.2"/>
  <text x="765" y="411" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Clinical</text>

  <rect x="820" y="390" width="90" height="32" rx="8" fill="#16b17e" fill-opacity="0.1" stroke="#16b17e" stroke-opacity="0.2"/>
  <text x="865" y="411" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Mutation</text>

  <rect x="920" y="390" width="90" height="32" rx="8" fill="#16b17e" fill-opacity="0.1" stroke="#16b17e" stroke-opacity="0.2"/>
  <text x="965" y="411" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Expression</text>

  <rect x="1020" y="390" width="80" height="32" rx="8" fill="#16b17e" fill-opacity="0.1" stroke="#16b17e" stroke-opacity="0.2"/>
  <text x="1060" y="411" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">CNV</text>

  <!-- === Output: Visualization === -->
  <rect x="80" y="310" width="520" height="200" rx="16" fill="#0d1020" stroke="#16b17e" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="80" y="310" width="520" height="200" rx="16" fill="#16b17e" fill-opacity="0.03"/>
  <text x="340" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3acc98">OUTPUT</text>

  <!-- Fake KM survival curve -->
  <text x="160" y="375" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Kaplan-Meier Survival</text>

  <!-- Axes -->
  <line x1="130" y1="480" x2="350" y2="480" stroke="#4b5563" stroke-width="1"/>
  <line x1="130" y1="390" x2="130" y2="480" stroke="#4b5563" stroke-width="1"/>

  <!-- TP53 wild-type curve (higher survival) -->
  <polyline points="130,395 160,395 180,400 200,408 220,415 240,425 260,432 280,438 300,442 320,445 340,447" stroke="#3acc98" stroke-width="2" fill="none"/>

  <!-- TP53 mutant curve (lower survival) -->
  <polyline points="130,395 150,405 170,420 185,440 200,452 215,460 230,465 250,470 270,473 300,475 340,477" stroke="#919ee6" stroke-width="2" fill="none" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <line x1="145" y1="495" x2="165" y2="495" stroke="#3acc98" stroke-width="2"/>
  <text x="170" y="498" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">TP53 WT</text>
  <line x1="230" y1="495" x2="250" y2="495" stroke="#919ee6" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="255" y="498" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">TP53 Mut</text>

  <!-- AI Summary box -->
  <rect x="380" y="370" width="200" height="120" rx="10" fill="#1a1f3d" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>
  <text x="400" y="393" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3acc98">AI Analysis</text>
  <text x="400" y="415" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">TP53 mutations show</text>
  <text x="400" y="430" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">significantly worse OS</text>
  <text x="400" y="445" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">in BRCA (p &lt; 0.001).</text>
  <text x="400" y="465" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Median: 42 vs 89 months.</text>
  <text x="400" y="480" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">n = 1,044 patients</text>

  <!-- Return arrow from output back to user -->
  <path d="M 210 310 L 210 280 Q 210 270 210 260" stroke="#16b17e" stroke-width="1.5" stroke-opacity="0.3" fill="none" stroke-dasharray="4,4"/>
  <polygon points="204,262 210,250 216,262" fill="#16b17e" fill-opacity="0.4"/>

  <!-- Bottom badge -->
  <rect x="460" y="555" width="280" height="36" rx="18" fill="#16b17e" fill-opacity="0.08" stroke="#16b17e" stroke-opacity="0.2"/>
  <text x="600" y="578" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#3acc98">orchestrated.bio/insight</text>
</svg>
