  <!-- Text -->
  <text x="160" y="85" font-family="'Montserrat', sans-serif" font-size="38" font-weight="700" fill="#2B2D42">ORCHESTRATED</text>
  <text x="165" y="115" font-family="'Montserrat', sans-serif" font-size="20" font-weight="400" fill="#087253" letter-spacing="8">BIOSCIENCES</text>
