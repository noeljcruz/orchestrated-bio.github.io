# Site settings
title: Orchestrated Biosciences
description: >-
  Orchestrated Biosciences combines agentic AI with biomedical expertise to
  accelerate precision medicine, drug discovery, and mission-critical
  government applications.
url: "https://orchestrated.bio"
baseurl: ""

# Brand
tagline: "AI-Driven Precision Medicine & Agentic AI Solutions"
email: support@orchestrated.bio
github_username: orchestrated-bio
logo: /images/logo-icon.png
og_image: /images/og-image.png

# Booking link (single source of truth)
booking_url: "https://calendar.app.google/BUsnTrvrYw8Y5b9p6"
insight_url: "https://insight.orchestrated.bio"

# Build settings
markdown: kramdown
permalink: /blog/:year/:month/:day/:title/

# Pagination
paginate: 6
paginate_path: "/blog/page:num"

# Plugins (all GitHub Pages whitelisted)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate
  - jekyll-redirect-from

# Feed settings
feed:
  path: /blog/feed.xml

# SEO defaults
twitter:
  card: summary_large_image

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - scripts/
  - tmp/
  - "*.tmp"
  - .DS_Store

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Alex Nesta, PhD"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
