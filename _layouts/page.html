---
layout: default
---

<div class="pt-20">
    <div class="max-w-4xl mx-auto px-4 py-16">
        {% if page.title %}
        <h1 class="text-3xl font-bold text-white mb-8">{{ page.title }}</h1>
        {% endif %}

        {% if page.last_updated %}
        <p class="text-sm text-gray-500 mb-8">Last updated: {{ page.last_updated }}</p>
        {% endif %}

        <div class="prose prose-invert prose-sm max-w-none space-y-6 text-gray-400 leading-relaxed
                    prose-headings:text-white prose-headings:font-semibold prose-headings:mt-8
                    prose-a:text-brand-400 prose-a:hover:text-brand-300
                    prose-strong:text-gray-300
                    prose-li:text-gray-400">
            {{ content }}
        </div>
    </div>
</div>
