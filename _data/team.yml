- name: "Alex Nesta, PhD"
  role: "Founder & Chief Technology Officer"
  photo: images/alex-nesta.jpg
  bio:
    - A decade of experience in Cancer Genomics and RNA Biology at UConn and The Jackson Laboratory.
    - Utilizing Bioinformatics and Data Science skills to build agentic AI solutions.
    - Making complex Genomic Data Analysis accessible to every researcher.
  skills:
    - Agentic AI
    - Cancer Genomics
    - Long-read RNA-seq
    - Spatial Omics
    - Biomarker ID
  links:
